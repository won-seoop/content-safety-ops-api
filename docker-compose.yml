services:
  app:
    build: .
    container_name: content-safety-ops-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/content_safety
      REDIS_URL: redis://redis:6379/0
      REDIS_TTL_SECONDS: 300
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    container_name: content-safety-postgres
    environment:
      POSTGRES_DB: content_safety
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d content_safety"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: content-safety-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
